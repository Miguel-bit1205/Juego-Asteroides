<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Juego Asteroide</title>
  </head>
  <body>
    <div id="HUD">
      <p>Vida: <span id="vidas">3</span></p>
      <p>Puntos:</p>
    </div>
    <canvas id="Juego"></canvas>
    <script>
      const canvas = document.getElementById("Juego");
      const ctx = canvas.getContext("2d");
      const hud = document.getElementById("HUD");

      function ajustarCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - hud.offsetHeight;
      }

      ajustarCanvas();
      window.addEventListener("resize", ajustarCanvas);

      let nave = {
        x: canvas.width / 2,
        y: canvas.height / 2,
        angulo: 0,
      };
      let disparos = [];
      let puedeDisparar = true;

      let vidas = 3;
      let vidasSpan = document.getElementById("vidas");
      let gameOver = false;

      function dibujarNave() {
        ctx.save();
        ctx.translate(nave.x, nave.y);
        ctx.rotate((nave.angulo * Math.PI) / 180);

        ctx.beginPath();
        ctx.moveTo(20, 0);
        ctx.lineTo(-15, -10);
        ctx.lineTo(-15, 10);
        ctx.closePath();

        ctx.fillStyle = "#ffffff";
        ctx.fill();
        ctx.strokeStyle = "#ffffff";
        ctx.stroke();

        ctx.restore();
      }

      function crearDisparo() {
        let radianes = (nave.angulo * Math.PI) / 180;

        let disparo = {
          x: nave.x + Math.cos(radianes) * 20,
          y: nave.y + Math.sin(radianes) * 20,
          dx: Math.cos(radianes) * 8,
          dy: Math.sin(radianes) * 8,
          radio: 3,
        };

        disparos.push(disparo);
      }

      function actualizarDisparos() {
        for (let i = 0; i < disparos.length; i++) {
          disparos[i].x += disparos[i].dx;
          disparos[i].y += disparos[i].dy;
        }
      }

      function dibujarDisparos() {
        for (let i = 0; i < disparos.length; i++) {
          ctx.beginPath();
          ctx.arc(
            disparos[i].x,
            disparos[i].y,
            disparos[i].radio,
            0,
            Math.PI * 2,
          );
          ctx.fillStyle = "#ffffff";
          ctx.fill();
        }
      }

      function limpiarDisparos() {
        disparos = disparos.filter(function (disparo) {
          return (
            disparo.x >= 0 &&
            disparo.x <= canvas.width &&
            disparo.y >= 0 &&
            disparo.y <= canvas.height
          );
        });
      }

      function perderVida() {
        if (gameOver) return;

        vidas--;

        if (vidas < 0) {
          vidas = 0;
        }

        vidasSpan.textContent = vidas;

        if (vidas <= 0) {
          gameOver = true;
        } else {
          nave.x = canvas.width / 2;
          nave.y = canvas.height / 2;
          nave.angulo = 0;
        }
      }

      function dibujar() {
        ctx.fillStyle = "#000000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (!gameOver) {
          if (
            nave.x < 0 ||
            nave.x > canvas.width ||
            nave.y < 0 ||
            nave.y > canvas.height
          ) {
            perderVida();
          }

          actualizarDisparos();
          limpiarDisparos();
        }

        dibujarNave();
        dibujarDisparos();

        requestAnimationFrame(dibujar);
      }

      document.addEventListener("keydown", function (evento) {
        if (gameOver) return;

        if (evento.key === "ArrowLeft") {
          nave.angulo -= 10;
        }

        if (evento.key === "ArrowRight") {
          nave.angulo += 10;
        }

        if (evento.key === "ArrowUp") {
          let radianes = (nave.angulo * Math.PI) / 180;
          nave.x += Math.cos(radianes) * 5;
          nave.y += Math.sin(radianes) * 5;
        }

        if (evento.key === " ") {
          if (puedeDisparar) {
            crearDisparo();
            puedeDisparar = false;

            setTimeout(() => {
              puedeDisparar = true;
            }, 100);
          }
        }
      });

      dibujar();
    </script>
  </body>
</html>
